services:
  aasx-server:
    container_name: aasx-server
    image: docker.io/adminshellio/aasx-server-blazor-for-demo:0.3.1.284-aasv3-alpha-latest
    restart: unless-stopped
    ports:
      - 5001:5001
    depends_on:
      - node-red-middleware
    volumes:
      - "./AASdata:/AasxServerBlazor/aasxs"
    command: --no-security --urls http://0.0.0.0:5001 --external-blazor http://192.168.250.102:5001
    networks:
      - zdm_network

  node-red-middleware:
    container_name: nodered
    image: nodered/node-red:latest
    restart: always
    ports:
      - "1880:1880"
    volumes:
      - ./nodereddata:/data
    networks:
      - zdm_network

  python_monitor:
    build: ./PythonScripts/monitor
    container_name: monitor
    environment:
      MIDDLEWARE_URL: "host.docker.internal"
      CSV_URL: "host.docker.internal:5004"
      AAS_URL: "host.docker.internal:5001"
      MODELS_URL: "host.docker.internal:5002"
      PORT: 5000
      PRINTER_API_KEY: "93c4GJTZNz1XIwUrLHEzofv5DdBNSPWLUd-FjCXFwsY"
    ports:
      - "5000:5000"
    depends_on:
      - node-red-middleware
    networks:
      - zdm_network

  python_assembly:
    build: ./PythonScripts/assembly
    container_name: assembly
    environment:
      MIDDLEWARE_URL: "host.docker.internal"
      CSV_URL: "host.docker.internal:5004"
      AAS_URL: "host.docker.internal:5001"
      MODELS_URL: "host.docker.internal:5002"
      PORT: 5006
      PRINTER_API_KEY: "93c4GJTZNz1XIwUrLHEzofv5DdBNSPWLUd-FjCXFwsY"
      BOX_LENGHT: 99.5
      BOX_WIDTH: 100
      SLOT_SIZE: 50
      MIN_GAP: 0.3
      FIT_GAP: 0.2
    ports:
      - "5006:5006"
    depends_on:
      - node-red-middleware
    networks:
      - zdm_network

  python_models:
    container_name: models
    build: ./PythonScripts/models
    environment:
      PORT: 5002
    ports:
      - "5002:5002"
    volumes:
      - ./modelsdata/models:/app/models
    depends_on:
      - node-red-middleware
    networks:
      - zdm_network

  python_explainables_aux:
    container_name: explainablesaiaux
    build: ./PythonScripts/explainableai/explainableaux
    environment:
      PORT: 5005
    ports:
    - "5005:5005"
    volumes:
      - ./modelsdata/models:/app/models
      - ./modelsdata/modelstrainingdata:/app/modelstrainingdata
    depends_on:
      - node-red-middleware
    networks:
      - zdm_network

  python_explainables_page_creator:
    container_name: explainablesaipage
    build: ./PythonScripts/explainableai/pagecreator
    environment:
      PORT: 5008
      ADDRESS: host.docker.internal
    ports:
      - "5008:5008"
      - "7860:7860"
    volumes:
      - ./modelsdata/models:/app/models
      - ./modelsdata/modelstrainingdata:/app/modelstrainingdata
    depends_on:
      - node-red-middleware
    networks:
      - zdm_network

  python_csv:
    build: ./PythonScripts/csv
    container_name: csv
    environment:
      CSV_FILENAME: "test.csv"
      PORT: 5004
    ports:
      - "5004:5004"
    depends_on:
    - node-red-middleware
    volumes:
      - ./CSVdata:/app/data
    networks:
      - zdm_network

  python_inspection:
    build: ./PythonScripts/inspection
    container_name: inspection
    environment:
      MIDDLEWARE_URL: "host.docker.internal:1880"
      AAS_URL: "host.docker.internal:5001"
      PORT: 5007
    ports:
      - "5007:5007"
    depends_on:
    - node-red-middleware
    networks:
      - zdm_network

  python_printer:
    build: ./PythonScripts/printer
    container_name: printer
    environment:
      PORT: 5003
      PRINTER_URL: "http://192.168.6.1:80"
      PRINTER_API_KEY: "93c4GJTZNz1XIwUrLHEzofv5DdBNSPWLUd-FjCXFwsY"
    ports:
      - "5003:5003"
    depends_on:
      - node-red-middleware
    networks:
      - zdm_network

networks:
  zdm_network:
    driver: bridge